name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

env:
  IMAGE_NAME: ghcr.io/ravilock/sentir-mais-classifier

jobs:
  prepare-image-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define Image Variants
        id: set-matrix
        run: |
          echo 'matrix={"include":[{"name":"cpu","dockerfile":"./Dockerfile","tag_suffix":"","build_args":""},{"name":"gpu","dockerfile":"./Dockerfile","tag_suffix":"-gpu","build_args":"PIP_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu128"}]}' >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: pip install ".[dev]"

      - name: Run Tests
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - test
      - prepare-image-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-image-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}${{ matrix.tag_suffix }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  docker-publish:
    runs-on: ubuntu-latest
    needs:
      - test
      - prepare-image-matrix
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-image-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest${{ matrix.tag_suffix }},enable={{is_default_branch}}
            type=ref,event=branch,suffix=${{ matrix.tag_suffix }}
            type=ref,event=tag,suffix=${{ matrix.tag_suffix }}
            type=sha,suffix=${{ matrix.tag_suffix }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
